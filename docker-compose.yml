services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: einss
      POSTGRES_USER: einss
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U einss"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: python manage.py migrate --noinput
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file: .env

  web:
    build: .
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 120
      --graceful-timeout 30
      --reload
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env

  worker:
    build: .
    command: celery -A config.celery worker -l info -Q default,cards
    volumes:
      - .:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env

  beat:
    build: .
    command: celery -A config.celery beat -l info --scheduler celery.beat:PersistentScheduler
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env

volumes:
  postgres_data:
  media_files:
