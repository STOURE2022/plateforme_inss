{% load i18n %}
<form action="{% url 'set_language' %}" method="post" id="lang-form-{{ form_id|default:'main-light' }}">
  {% csrf_token %}
  <input name="next" type="hidden" value="{{ request.get_full_path }}">
  <div class="flex items-center gap-1 rounded-lg p-1" style="background:rgba(15,23,42,0.07);">
    <button type="submit" name="language" value="pt-br"
            class="px-2.5 py-1 rounded-md text-xs font-bold transition-all {% if LANGUAGE_CODE == 'pt-br' %}bg-slate-800 text-white{% else %}text-slate-500 hover:text-slate-800{% endif %}">
      PT
    </button>
    <button type="submit" name="language" value="fr"
            class="px-2.5 py-1 rounded-md text-xs font-bold transition-all {% if LANGUAGE_CODE == 'fr' %}bg-slate-800 text-white{% else %}text-slate-500 hover:text-slate-800{% endif %}">
      FR
    </button>
  </div>
</form>
