{% if page_obj.has_other_pages %}
<div class="flex items-center justify-between px-6 py-4 border-t border-slate-100">
  <p class="text-sm text-slate-500">
    Página <span class="font-semibold text-slate-700">{{ page_obj.number }}</span>
    de <span class="font-semibold text-slate-700">{{ page_obj.paginator.num_pages }}</span>
    &mdash; {{ page_obj.paginator.count }} resultado{{ page_obj.paginator.count|pluralize }}
  </p>
  <div class="flex items-center gap-1">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}"
       class="flex items-center gap-1 px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all font-medium">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Anterior
    </a>
    {% endif %}

    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}"
       class="flex items-center gap-1 px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition-all font-medium">
      Próxima
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </a>
    {% endif %}
  </div>
</div>
{% endif %}
