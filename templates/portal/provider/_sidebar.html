{% load i18n %}
<a href="{% url 'provider-dashboard' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if request.resolver_match.url_name == 'provider-dashboard' %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
  </svg>
  <span>{% trans "Painel" %}</span>
</a>

<div class="px-3 pt-4 pb-1">
  <p class="text-white/30 text-xs font-semibold uppercase tracking-wider">{% trans "Verificação" %}</p>
</div>

<a href="{% url 'provider-verify' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if request.resolver_match.url_name == 'provider-verify' %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
  </svg>
  <span>{% trans "Verificar Cartão" %}</span>
</a>

   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if request.resolver_match.url_name == 'provider-history' %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
  </svg>
  <span>{% trans "Histórico" %}</span>
</a>

<a href="{% url 'provider-my-acts' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if 'my-acts' in request.resolver_match.url_name or 'act-detail' in request.resolver_match.url_name %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
  </svg>
  <span class="flex-1">{% trans "Meus Actos" %}</span>
</a>

<div class="px-3 pt-4 pb-1">
  <p class="text-white/30 text-xs font-semibold uppercase tracking-wider">{% trans "Perfil" %}</p>
</div>

<a href="{% url 'provider-profile' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if request.resolver_match.url_name == 'provider-profile' %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
  </svg>
  <span>{% trans "Perfil da Clínica" %}</span>
</a>

<div class="px-3 pt-4 pb-1">
  <p class="text-white/30 text-xs font-semibold uppercase tracking-wider">{% trans "Conta" %}</p>
</div>

<a href="{% url 'html-security-settings' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if request.resolver_match.url_name == 'html-security-settings' %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
  </svg>
  <span>{% trans "Segurança" %}</span>
  {% if not request.user.mfa_enabled %}
  <span class="ml-auto w-2 h-2 rounded-full bg-amber-400 flex-shrink-0"></span>
  {% endif %}
</a>
