{% if valid %}
<!-- SUCESSO -->
<div class="bg-white rounded-3xl border-2 border-emerald-200 shadow-sm overflow-hidden" style="animation: fadeIn 0.3s ease-out;">

  <!-- Banner vert -->
  <div class="bg-emerald-500 px-6 py-4 flex items-center gap-4">
    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center flex-shrink-0">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <div>
      <div class="text-white font-bold text-lg">Cartão Válido</div>
      <div class="text-emerald-100 text-sm">Verificação bem-sucedida às {{ verified_at|date:"H:i" }}</div>
    </div>
  </div>

  <!-- Infos -->
  <div class="p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-slate-50 rounded-xl p-4">
        <div class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">Titular</div>
        <div class="font-bold text-slate-900">{{ affiliate_name }}</div>
      </div>
      <div class="bg-slate-50 rounded-xl p-4">
        <div class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">N.º Cartão</div>
        <div class="font-bold text-slate-900 font-mono text-sm">{{ card_number }}</div>
      </div>
      <div class="bg-slate-50 rounded-xl p-4">
        <div class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">Estado</div>
        <span class="inline-flex items-center gap-1.5 text-emerald-700 font-bold text-sm">
          <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>ATIVO
        </span>
      </div>
      <div class="bg-slate-50 rounded-xl p-4">
        <div class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">Validade</div>
        <div class="font-bold text-slate-900">{{ expiry_date }}</div>
      </div>
    </div>
  </div>
</div>

{% else %}
<!-- ÉCHEC -->
<div class="bg-white rounded-3xl border-2 border-red-200 shadow-sm overflow-hidden" style="animation: fadeIn 0.3s ease-out;">
  <div class="bg-red-500 px-6 py-4 flex items-center gap-4">
    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center flex-shrink-0">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>
    <div>
      <div class="text-white font-bold text-lg">Cartão Inválido</div>
      <div class="text-red-100 text-sm">{{ error }}</div>
    </div>
  </div>
  <div class="p-6">
    <div class="flex items-center gap-3 p-4 bg-red-50 rounded-xl border border-red-100">
      <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
      <span class="text-red-700 text-sm font-semibold">Código de erro: {{ error_code }}</span>
    </div>
  </div>
</div>
{% endif %}
