{% load i18n %}
{% if act_success %}
<div class="p-4 bg-emerald-50 border border-emerald-200 rounded-xl flex items-start gap-3" style="animation: fadeIn 0.3s ease-out;">
  <svg class="w-5 h-5 text-emerald-600 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0110 1.944 11.954 11.954 0 0117.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
  </svg>
  <div>
    <p class="text-emerald-800 font-semibold text-sm">{% trans "Acto médico registado com sucesso" %}</p>
    <p class="text-emerald-700 text-xs mt-0.5">
      {% trans "Referência" %}: <span class="font-mono font-bold">{{ act.reference }}</span> —
      {% trans "Estado" %}: <span class="font-semibold">{% trans "Pendente de validação INSS" %}</span>
    </p>
  </div>
</div>
{% else %}
<div class="p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3">
  <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
  </svg>
  <div>
    <p class="text-red-800 font-semibold text-sm">{% trans "Erro ao registar acto" %}</p>
    <p class="text-red-700 text-xs mt-0.5">{{ error }}</p>
  </div>
</div>
{% endif %}
