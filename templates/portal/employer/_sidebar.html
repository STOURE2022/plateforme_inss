{% load i18n %}
<a href="{% url 'employer-dashboard' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium
   {% if request.resolver_match.url_name == 'employer-dashboard' %}active text-white{% else %}text-white/70 hover:text-white{% endif %}">
  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
  </svg>
  <span>{% trans "Painel" %}</span>
</a>

<div class="px-3 pt-4 pb-1">
  <p class="text-white/30 text-xs font-semibold uppercase tracking-wider">{% trans "Declarações" %}</p>
</div>

<a href="{% url 'employer-declaration-list' %}"
   class="sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium

   class="sidebar-item flex items-center gap-3 pl-10 pr-3 py-2 rounded-xl text-sm font-medium text-white/50 hover:text-white/80">

    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
